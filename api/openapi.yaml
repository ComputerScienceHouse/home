openapi: 3.0.0
info:
  title: CSH Home overview
  version: alpha
paths:
  /api/v1/users:
    get:
      operationId: GetUsers
      summary: List users
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                title: Users
                description: List of users
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /api/v1/users/{id}:
    get:
      operationId: GetUser
      summary: Returns a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Get fields outside the default fields. May require additional OIDC scopes.
          # TODO: make this schema correct
          schema:
            type: array
            items:
              type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"




components:
  schemas:
    ID:
      type: string
      description: UUID
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      example: 1066d8cd-cf62-4024-ae3e-df8550cd6b71

    User:
      type: object
      description: Resprentation of a User.
      properties:
        user_id:
          $ref: "#/components/schemas/ID"
        username:
          type: string
          example: "jeffmahoney"
          nullable: false
        first_name:
          type: string
          example: "Jeffrey"
          nullable: false
        last_name:
          type: string
          example: "Mahoney"
          nullable: false
        display_name:
          type: string
          example: "Jeff Mahoney (REAL)"
          nullable: false
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
          nullable: false
        email:
          type: string
          description: Otherwise known as UPN in Microsoft-land
          nullable: false
        member_since:
          type: string
          example: 20230918195013.126954-0500
          nullable: false
        login_shell:
          type: string
          example: /bin/sh
          nullable: false
        home_directory:
          type: string
          example: /users/0/root
          nullable: false
        rit_username:
          type: string
          example: abc1234
          nullable: false
        class_year:
          type: integer
          example: 1970
        major:
          type: string
          example: Cybersecurity B.S.
        minor:
          type: string
          example: Mathematics
        housing_points:
          type: integer
          example: 0
        drink_balance:
          type: integer
          example: 8720
        room_number:
          type: integer
          example: 3038
        birthday:
          type: number
          example: 20040221
        slack_uid:
          type: string
          example: UJ127DN6CZ
        pronouns:
          type: string
          example: they/them
        callsign:
          type: string
          example: K8ERS
        public_keys:
          type: array
          items:
            type: string
        emails:
          type: array
          items:
            type: string
        phone_number:
          type: array
          items:
            type: string
        address:
          type: string
        #social media goes below this point
        website:
          type: string
          example: https://rit.edu
        blog:
          type: string
          example: https://blog.rit.edu
        resume_url:
          type: string
          example: https://csh.rit.edu/not-my-resume.pdf
        plex:
          type: string
          example: csh
        twitter:
          type: string
          example: "@ComputerScienceHouse"
        github:
          type: string
          example: "@ComputerScienceHouse"
        codeberg:
          type: string
          example: "@ComputerScienceHouse"
      example:
        user_id: 1066d8cd-cf62-4024-ae3e-df8550cd6b71
        username: jeffmahoney
        first_name: Jeff
        last_name: Mahoney
        display_name: Jeff Mahoney (REAL)
        email: jeffmahoney@csh.rit.edu
        groups: ["current_student", "active", "member", "coop-fall"]

    Group:
      type: string
      description: A group / role for a User
      example: current_student

  securitySchemes:
    oidc: # <--- Arbitrary name for the security scheme. Used to refer to it from elsewhere.
      type: openIdConnect
      openIdConnectUrl: https://sso.csh.rit.edu/auth/realms/csh/.well-known/openid-configuration


security:
  - oidc: [ ]


